<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Berserk Rush - Trailer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .scene.active {
            opacity: 1;
            z-index: 2;
        }
        .media-element {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%) scale(1.02);
            object-fit: cover;
            z-index: -1;
            /* Delikatne przybliżenie (Ken Burns) dla filmów oraz zdjęć UI */
            animation: kenburns 15s infinite alternate ease-in-out;
        }
        @keyframes kenburns {
            from { transform: translateX(-50%) translateY(-50%) scale(1.02); }
            to { transform: translateX(-50%) translateY(-50%) scale(1.1); }
        }
        .text-overlay {
            position: relative;
            z-index: 10;
            color: #fff;
            font-size: 5vw;
            text-align: center;
            text-shadow: 0 0 20px #000, 0 0 40px #ff4500, 2px 2px 4px rgba(0,0,0,0.8);
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.5s ease-out;
            letter-spacing: 0.1em;
            font-weight: bold;
            text-transform: uppercase;
        }
        .scene.active .text-overlay {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 1.5s; /* Tekst pojawia się chwilę po wczytaniu sceny */
        }
        
        /* Klasa z opóźnieniem dla tekstu przedmiotów (czeka na koniec dialogu 2) */
        .scene.active .text-overlay.items-text {
            transition-delay: 1.5s; 
        }

        /* Epicki przycisk/napis na sam koniec (Outro) */
        .outro-cta {
            top: auto;
            bottom: 8%; /* Odsuwamy mocno w dół, żeby nie zasłaniać logo */
            transform: translateY(30px); /* startuje niżej */
        }
        .scene.active .outro-cta {
            transform: translateY(0);
            transition-delay: 2s; /* Pojawia się 2 sekundy po wejściu logo */
        }
        .cta-main {
            font-size: 3.5vw;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-shadow: 0 0 15px #ff4500, 0 0 30px #ff0000, 0 5px 10px rgba(0,0,0,0.9);
            display: block;
        }
        .cta-sub {
            font-family: 'Arial', sans-serif;
            font-size: 1.2vw;
            font-weight: bold;
            letter-spacing: 0.4em;
            color: #bbbbbb;
            text-transform: uppercase;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
            margin-top: 1vh;
            display: block;
        }
        
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 24px;
            background: rgba(255, 69, 0, 0.8);
            color: white;
            border: 2px solid #fff;
            cursor: pointer;
            z-index: 100;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6);
            transition: background 0.3s, transform 0.3s;
        }
        #start-btn:hover {
            background: rgba(255, 0, 0, 0.9);
            transform: translate(-50%, -50%) scale(1.05);
        }
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9); /* Zaciemnione krawędzie */
            pointer-events: none;
            z-index: 5;
        }
        
        /* Particle effects w CSS dla iskier */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 4;
            background: transparent;
        }

        /* Infinite Scroll Items */
        .items-bg {
            position: absolute;
            top: -20%; left: -20%; width: 140%; height: 140%; /* Większy obszar, by zniwelować kąt obrotu */
            background: #000;
            overflow: hidden;
            display: flex;
            gap: 20px;
            justify-content: center;
            opacity: 0.6;
            transform: rotate(10deg);
        }
        .item-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: scroll-up 12s linear infinite;
        }
        .item-column:nth-child(even) {
            animation: scroll-down 15s linear infinite;
        }
        .item-icon {
            width: 100px;
            height: 100px;
            border: 2px solid #555;
            border-radius: 10px;
            background: rgba(0,0,0,0.8);
            object-fit: contain;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        @keyframes scroll-up {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }
        @keyframes scroll-down {
            from { transform: translateY(-50%); }
            to { transform: translateY(0); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <button id="start-btn">Odtwórz Zwiastun</button>

    <div class="vignette"></div>
    <div class="particles" id="particles-container"></div>

    <!-- Audio Player dla Lektora / Muzyki -->
    <audio id="bg-music" src="trailer.mp3" loop></audio>
    <audio class="voiceover" src="1.mp3"></audio>
    <audio class="voiceover" src="2.mp3"></audio>
    <audio class="voiceover" src="3.mp3"></audio>
    <audio class="voiceover" src="4.mp3"></audio>
    <audio class="voiceover" src="5.mp3"></audio>
    <audio class="voiceover" src="6.mp3"></audio>
    <audio class="voiceover" src="7.mp3"></audio>

    <!-- Scena 1: Las -->
    <div class="scene" data-voice="0">
        <video src="scene1.mp4" class="media-element" muted playsinline loop></video>
        <div class="text-overlay">ŚWIAT POGRĄŻONY W CHAOSIE...</div>
    </div>
    
    <!-- Scena 1a: Hero na Koniu -->
    <div class="scene">
        <video src="scene1a.mp4" class="media-element" muted playsinline loop></video>
    </div>
    
    <!-- Scena 2: Kuźnia -->
    <div class="scene" data-voice="1">
        <video src="scene2.mp4" class="media-element" muted playsinline loop></video>
        <div class="text-overlay">WYKUJ SWOJĄ LEGENDĘ</div>
    </div>

    <!-- Scena 2.5: Items Scroll -->
    <div class="scene" data-voice="5" data-voice-delay="1500">
        <div class="items-bg">
            <!-- columns added dynamically via JS -->
        </div>
        <div class="text-overlay items-text" style="font-size: 3.5vw; text-shadow: 0 0 30px #000, 0 0 20px #ffaa00; line-height: 1.5; z-index: 10;">
            ZDOBYWAJ EPICKIE ARTEFAKTY<br>
            <span style="font-size: 2.5vw; color: #ccc;">Wykuj rynsztunek, który wstrząśnie fundamentami tego świata!</span>
        </div>
    </div>

    <!-- Scena 3: Game Footage - Hub (Static -> Animated transition) -->
    <div class="scene" id="hub-scene" data-voice="6">
        <div id="hub-media-container" style="width: 100%; height: 100%; position: absolute; overflow: hidden; transform-origin: 33% 38%;">
            <img src="scene2a.png" class="media-element">
        </div>
        <div class="text-overlay" style="font-size: 4vw;">ROZWIJAJ SWOJĄ POSTAĆ</div>
        <!-- Kursor myszki do animacji kliknięcia -->
        <svg id="trailer-cursor" width="60" height="60" viewBox="0 0 24 24" style="position: absolute; left: 80%; top: 80%; z-index: 50; opacity: 0; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));">
            <path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2.9-3.2-7.4-4.4 4.7z" fill="white" stroke="black" stroke-width="1.5"/>
        </svg>
    </div>

    <!-- Scena 4: Game Footage - Profil (Animated) -->
    <div class="scene">
        <video src="3A.mp4" class="media-element" muted playsinline loop></video>
        <div class="text-overlay" style="font-size: 4vw; color: #aaffaa;">WYKLUWAJ POTĘŻNE CHOWAŃCE</div>
    </div>
    
    <!-- Scena 5: World Boss -->
    <div class="scene" data-voice="2">
        <video src="scene3.mp4" class="media-element" muted playsinline loop></video>
        <div class="text-overlay">PODEJMIJ WYZWANIE</div>
    </div>

    <!-- Scena 6: Game Footage - Wybór Mapy (Static -> Animated transition) -->
    <div class="scene" id="map-scene">
        <div id="map-media-container" style="width: 100%; height: 100%; position: absolute; overflow: hidden; transform-origin: 38.5% 57%;">
            <img src="scene4a.png" class="media-element">
        </div>
        <!-- Kursor myszki do animacji kliknięcia w 1 mapę -->
        <svg id="map-cursor" width="60" height="60" viewBox="0 0 24 24" style="position: absolute; left: 80%; top: 80%; z-index: 50; opacity: 0; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));">
            <path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2.9-3.2-7.4-4.4 4.7z" fill="white" stroke="black" stroke-width="1.5"/>
        </svg>
    </div>

    <!-- Scena 7: Game Footage - Walka (Static) -->
    <div class="scene">
        <img src="5a.png" class="media-element">
    </div>
    
    <!-- Scena 8: Arena -->
    <div class="scene" data-voice="3">
        <video src="scene4.mp4" class="media-element" muted playsinline loop></video>
        <div class="text-overlay">ZDOMINUJ ARENĘ</div>
    </div>
    
    <!-- Scena 10: Outro (Logo + CTA) -->
    <div class="scene" data-voice="4">
        <video src="scene5.mp4" class="media-element" muted playsinline loop></video>
        <!-- Zmodernizowany, epicki tekst CTA na samym dole -->
        <div class="text-overlay outro-cta">
            <span class="cta-main">Zagraj za darmo</span>
            <span class="cta-sub">Bez pobierania • W przeglądarce</span>
        </div>
    </div>

    <script>
        const scenes = document.querySelectorAll('.scene');
        const startBtn = document.getElementById('start-btn');
        const bgMusic = document.getElementById('bg-music');
        const voiceovers = document.querySelectorAll('.voiceover');
        
        // Czasy naprawione! Usunięto 1-sekundowy lag poprzez skrócenie wideo-scen do 5 sekund.
        // 0(Las):5s, 1(Koń):5s, 2(Kuźnia):7s, 3(Przedmioty):9s, 
        // 4(Hub):2.3s, 5(Profil):7.7s, 6(Boss):5s, 7(Mapa):1.8s, 8(Walka):4.2s, 9(Arena):8s, 10(Outro):5s
        const timings = [5000, 5000, 7000, 9000, 2300, 7700, 5000, 1800, 4200, 8000, 5000]; 
        
        startBtn.addEventListener('click', () => {
            startBtn.style.opacity = '0';
            setTimeout(() => { startBtn.style.display = 'none'; }, 300);
            
            // Odpalamy muzykę w tle na 40% głośności
            bgMusic.volume = 0.4;
            bgMusic.play().catch(e => console.log("Muzyka zablokowana:", e));
            
            playTrailerSequence();
            createParticles();
        });

        async function playTrailerSequence() {
            let delayAcc = 0;
            
            for (let i = 0; i < scenes.length; i++) {
                setTimeout(() => {
                    // Ukryj poprzednią scenę
                    if(i > 0) {
                        scenes[i-1].classList.remove('active');
                        let prevVideo = scenes[i-1].querySelector('video');
                        if (prevVideo) prevVideo.pause(); 
                    }
                    
                    // Pokaż obecną scenę
                    scenes[i].classList.add('active');
                    
                    // --- ANIMACJA LOGOWANIA DO PROFILU (HUB SCENE) ---
                    if (scenes[i].id === 'hub-scene') {
                        const cursor = document.getElementById('trailer-cursor');
                        const hubContainer = document.getElementById('hub-media-container');
                        
                        // Reset
                        cursor.style.transition = 'none';
                        cursor.style.opacity = '0';
                        cursor.style.left = '80%';
                        cursor.style.top = '80%';
                        cursor.style.transform = 'scale(1)';
                        hubContainer.style.transition = 'none';
                        hubContainer.style.transform = 'scale(1)';
                        
                        // Ruch kursora
                        setTimeout(() => {
                            cursor.style.transition = 'all 1.5s cubic-bezier(0.25, 1, 0.5, 1)';
                            cursor.style.opacity = '1';
                            cursor.style.left = '33%'; // Orientacyjna pozycja przycisku "POSTAĆ"
                            cursor.style.top = '38%';
                        }, 500);
                        
                        // Kliknięcie
                        setTimeout(() => {
                            cursor.style.transition = 'transform 0.1s';
                            cursor.style.transform = 'scale(0.8)';
                        }, 2000);
                        
                        // Odbicie i wielki Zoom
                        setTimeout(() => {
                            cursor.style.transform = 'scale(1)';
                            cursor.style.opacity = '0'; // kursor znika
                            
                            // Płynny, ale dynamiczny wjazd w profil
                            hubContainer.style.transition = 'transform 1.5s cubic-bezier(0.5, 0, 0, 1)';
                            hubContainer.style.transform = 'scale(6)';
                        }, 2100);
                    }
                    
                    // --- ANIMACJA WYBORU MAPY (MAP SCENE) ---
                    if (scenes[i].id === 'map-scene') {
                        const mCursor = document.getElementById('map-cursor');
                        const mapContainer = document.getElementById('map-media-container');
                        
                        // Reset
                        mCursor.style.transition = 'none';
                        mCursor.style.opacity = '0';
                        mCursor.style.left = '80%';
                        mCursor.style.top = '80%';
                        mCursor.style.transform = 'scale(1)';
                        mapContainer.style.transition = 'none';
                        mapContainer.style.transform = 'scale(1)';
                        
                        // Ruch kursora (szybszy niż w hubie, bo to walka!)
                        setTimeout(() => {
                            mCursor.style.transition = 'all 1.0s cubic-bezier(0.25, 1, 0.5, 1)';
                            mCursor.style.opacity = '1';
                            mCursor.style.left = '38.5%'; // Pozycja zielonego przycisku "Wejdź na mapę"
                            mCursor.style.top = '57%';
                        }, 400);
                        
                        // Kliknięcie
                        setTimeout(() => {
                            mCursor.style.transition = 'transform 0.1s';
                            mCursor.style.transform = 'scale(0.8)';
                        }, 1400);
                        
                        // Zoom w wybraną mapę
                        setTimeout(() => {
                            mCursor.style.transform = 'scale(1)';
                            mCursor.style.opacity = '0'; 
                            
                            mapContainer.style.transition = 'transform 1.2s cubic-bezier(0.5, 0, 0, 1)';
                            mapContainer.style.transform = 'scale(5)';
                        }, 1500);
                    }
                    
                    // Jeśli to wideo, odtwórz od początku
                    let currentVideo = scenes[i].querySelector('video');
                    if(currentVideo) {
                        currentVideo.currentTime = 0;
                        currentVideo.play().catch(e => console.log("Odtwarzanie wideo zablokowane:", e));
                    }
                    
                    // Sprawdź, czy scena ma przypisanego lektora i opóźnienie
                    let voiceIndex = scenes[i].getAttribute('data-voice');
                    let voiceDelay = scenes[i].getAttribute('data-voice-delay');
                    let delay = voiceDelay ? parseInt(voiceDelay) : 100;
                    
                    if(voiceIndex !== null) {
                        // Kiedy następuje czas na NOWEGO lektora, ucinamy poprzedniego by uniknąć chaosu.
                        // Ale opóźnienie powoduje, że stary lektor może naturalnie wybrzmieć podczas wchodzenia nowej sceny!
                        setTimeout(() => {
                            voiceovers.forEach(v => { v.pause(); v.currentTime = 0; });
                            voiceovers[voiceIndex].play().catch(e => console.log("Lektor zablokowany:", e));
                        }, delay);
                    }
                    // UWAGA: Jeśli scena nie ma przypisanego lektora (np. przebitka UI), 
                    // stary lektor nadal może kontynuować swoją wypowiedź! To świetny efekt trailerowy.
                    
                }, delayAcc);
                
                delayAcc += timings[i];
            }
        }
        
        // Prosty efekt cząsteczek (iskier) latających po ekranie
        function createParticles() {
            const container = document.getElementById('particles-container');
            for(let i=0; i<50; i++) {
                let particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = Math.random() * 4 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = '#ffaa00';
                particle.style.boxShadow = '0 0 10px #ff0000';
                particle.style.borderRadius = '50%';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                particle.style.opacity = Math.random();
                
                // Animacja przesuwania do góry
                particle.animate([
                    { transform: `translate(0, 0)`, opacity: 0 },
                    { opacity: Math.random() },
                    { transform: `translate(${Math.random()*100 - 50}px, -${Math.random()*200 + 100}px)`, opacity: 0 }
                ], {
                    duration: Math.random() * 3000 + 2000,
                    iterations: Infinity,
                    delay: Math.random() * 2000
                });
                
                container.appendChild(particle);
            }
        }
        
        // Funkcja generująca nieskończony grid przedmiotów
        function createItemsScroll() {
            const bg = document.querySelector('.items-bg');
            if(!bg) return;
            
            // Tablica dostępnych grafik przedmiotów z assets/items
            const itemIcons = [
                'amulet-madrosci.png', 'bojowy-topor.png', 'drewniana-rozdzka.png',
                'goblinski-sztylet.png', 'kolczuga.png', 'miecz-nowicjusza.png',
                'pierscien-sily.png', 'skorzana-zbroja.png', 'skorzane-buty.png',
                'skorzany-helm.png', 'stalowy-miecz.png', 'szamanski-koralik.png',
                'zelazny-helm.png', 'zardzewialy-miecz.png', 'runiczny-kamien.png',
                'amulet-zywotnosci.png', 'mroczne-futro.png', 'wiedzmi-amulet.png'
            ];
            
            // Generujemy np. 9 kolumn
            for(let i = 0; i < 9; i++) {
                let col = document.createElement('div');
                col.className = 'item-column';
                let iconsHTML = '';
                
                // Tasujemy tablicę dla każdej kolumny by grid wyglądał unikalnie i losowo
                let shuffled = [...itemIcons].sort(() => 0.5 - Math.random());
                
                shuffled.forEach(item => {
                    // Odwołanie relatywne do katalogu resources - w ten sposób zadziała w public/trailer/
                    iconsHTML += `<img src="../../storage/app/assets/items/${item}" class="item-icon">`;
                });
                
                // Kopiujemy zawartość dwukrotnie, żeby animacja od góry do translateY(-50%) była perfekcyjnym loopem
                col.innerHTML = iconsHTML + iconsHTML;
                bg.appendChild(col);
            }
        }
        
        createItemsScroll();
    </script>
</body>
</html>
